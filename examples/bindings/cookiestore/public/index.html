<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Gooey CookieStore Example</title>
		<link rel="shortcut icon" href="/favicon.ico" />
	</head>
	<body>
		<main>
			<article>
				<b>Set a Cookie</b>
				<br>
				<input data-name="set-name" placeholder="cookie-name">
				<br>
				<input data-name="set-value" placeholder="Hello world!">
				<br><br>
				<div data-name="set-output"></div>
				<br><br>
				<button data-action="set-cookie">Call CookieStore.Set()</button>
			</article>
			<hr>
			<article>
				<b>Get a Cookie</b>
				<br>
				<input data-name="get-name" placeholder="cookie-name">
				<br><br>
				<div data-name="get-output"></div>
				<br><br>
				<button data-action="get-cookie">Call CookieStore.Get()</button>
			</article>
		</main>
		<script src="wasm_exec.js"></script>
		<script src="wasm_init.js"></script>
	</body>
</html>
